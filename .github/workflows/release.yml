name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: tlsh

jobs:
  verify:
    name: Verify (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux-x64
          - runner: ubuntu-24.04-arm
            label: linux-arm64
          - runner: windows-2025
            label: windows-x64
          - runner: windows-11-arm
            label: windows-arm64
          - runner: macos-15-intel
            label: macos-intel
          - runner: macos-latest
            label: macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run fmt check
        if: matrix.label == 'linux-x64'
        run: cargo fmt --check

      - name: Run coverage validation
        run: cargo llvm-cov --workspace --all-targets --summary-only

      - name: Check package metadata
        if: matrix.label == 'linux-x64'
        run: cargo package --locked --allow-dirty

  create-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true

  build-release:
    name: Build release (${{ matrix.label }})
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            binary_name: tlsh
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-arm64
            binary_name: tlsh
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            label: windows-x64
            binary_name: tlsh.exe
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            label: windows-arm64
            binary_name: tlsh.exe
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            label: macos-intel
            binary_name: tlsh
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            binary_name: tlsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME:-${GITHUB_SHA::7}}"
          ARCHIVE_BASENAME="tlsh-rs-${VERSION}-${{ matrix.label }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          tar -C dist -czf "${ARCHIVE_BASENAME}.tar.gz" "${{ matrix.binary_name }}"
          echo "ARCHIVE_NAME=${ARCHIVE_BASENAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { $env:GITHUB_SHA.Substring(0, 7) }
          $archiveBase = "tlsh-rs-$version-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "$archiveBase.zip" -Force
          "ARCHIVE_NAME=$archiveBase.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ env.ARCHIVE_NAME }}

      - name: Upload archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_NAME }}

  publish-crate:
    name: Publish to crates.io
    needs: build-release
    runs-on: ubuntu-24.04
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: cargo publish --locked
