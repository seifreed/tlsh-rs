name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            label: linux-x64
            coverage: true
          - runner: ubuntu-24.04-arm
            label: linux-arm64
            coverage: true
          - runner: windows-2025
            label: windows-x64
            coverage: true
          - runner: windows-11-arm
            label: windows-arm64
            coverage: false
          - runner: macos-15-intel
            label: macos-intel
            coverage: true
          - runner: macos-latest
            label: macos-arm64
            coverage: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        if: matrix.coverage
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run fmt check
        if: matrix.label == 'linux-x64'
        run: cargo fmt --check

      - name: Generate coverage report
        if: matrix.coverage
        run: cargo llvm-cov --workspace --all-targets --lcov --output-path lcov.info

      - name: Run tests without coverage
        if: ${{ !matrix.coverage }}
        run: cargo test --locked --all-targets

      - name: Upload coverage reports to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: seifreed/tlsh-rs
          files: lcov.info
          flags: ${{ matrix.label }}
          name: ${{ matrix.label }}
